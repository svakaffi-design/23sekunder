<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>23sekunder</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    font-size: 3rem;
}

#info {
    font-size: 1.5rem;
    margin-top: 20px;
}
</style>
</head>

<body>

<div>
    <h1>23sekunder</h1>
    <div id="info">Trykk SPACE for å starte</div>
</div>

<script>
let startTime = null;
let running = false;
const goal = 23;
const info = document.getElementById("info");

document.addEventListener("keydown", function(e) {
    if (e.code === "Space") {

        if (!running) {
            startTime = Date.now();
            running = true;
            info.textContent = "Tidtaker startet...";
        } 
        
        else {
            const endTime = Date.now();
            const seconds = (endTime - startTime) / 1000;
            const difference = Math.abs(seconds - goal);

            info.innerHTML = `
                Du stoppet på ${seconds.toFixed(2)} sekunder.<br>
                Du var ${difference.toFixed(2)} sekunder fra målet.<br><br>
                Trykk SPACE for å prøve igjen
            `;

            running = false;
        }
    }
});
</script>

</body>
</html>
